# .github/workflows/grant-scanner.yml
# ============================================================================
# Automated Grant Scanner for Abraji
# Runs Monday-Friday at 07:00 BRT (10:00 UTC) and sends email report
# ============================================================================

name: "📡 Grant Scanner — Abraji"

on:
  schedule:
    # 07:00 BRT = 10:00 UTC (BRT = UTC-3)
    # 1-5 = Monday through Friday
    - cron: "0 10 * * 1-5"

  # Allow manual trigger for testing
  workflow_dispatch:

# Write permission required to commit docs/data.json for GitHub Pages
permissions:
  contents: write

# Prevent concurrent runs
concurrency:
  group: grant-scanner
  cancel-in-progress: true

jobs:
  scan-grants:
    runs-on: ubuntu-latest
    timeout-minutes: 30        # 3 passes com thinking=HIGH + gemini-3-pro-preview podem levar ~25min

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "📦 Install dependencies"
        run: pip install "google-genai>=1.0.0" requests "gspread>=6.0.0"

      - name: "🔍 Run Grant Scanner"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: python grant_scanner.py

      - name: "📎 Upload reports as artifacts"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "grant-report-${{ github.run_number }}"
          path: |
            grant_report.md
            grant_report.json
          retention-days: 90

      - name: "🌐 Commit dashboard data to GitHub Pages"
        run: |
          if [ ! -f docs/data.json ]; then
            echo "docs/data.json not found — Sheets upload likely failed. Skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet && echo "No changes to commit." || \
            git commit -m "chore: update dashboard data [skip ci]"
          git push
